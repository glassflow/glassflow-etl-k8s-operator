name: Build Operator Binary

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string to embed in the binary (commit SHA)'
        required: false
        type: string

jobs:
  build-operator-binary:
    name: Build Operator Binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.mod'
      - name: Build binary
        run: |
          mkdir -p bin
          VERSION="${BUILD_VERSION:-$(git rev-parse HEAD)}"
          echo "VERSION=${VERSION}"
          CGO_ENABLED=0 GOOS=${{ matrix.platform.os }} GOARCH=${{ matrix.platform.arch }} go build -mod=readonly -ldflags "-X main.version=${VERSION}" -o bin/manager cmd/main.go
        env:
          BUILD_VERSION: ${{ inputs.version }}
          GOOS: ${{ matrix.platform.os }}
          GOARCH: ${{ matrix.platform.arch }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 1
          name: operator-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: bin/
